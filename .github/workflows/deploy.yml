name: Deploy

# CI/CD per spec §1.3: lint → build → deploy over SSH to the Hetzner VPS.
# Mirrors the owner's maningo / benchworks pattern: Docker Compose on the VPS
# behind the shared `hampton_nginx` reverse proxy; app secrets injected from a
# Doppler-synced .env on the host.
#
# Triggers on push to main (and manual dispatch). The actual SSH step is GATED
# on the deploy secrets existing — until they are configured it runs green as a
# no-op, so it never blocks merges before the VPS target is provisioned.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-test:
    name: Build & test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web — install, lint, build
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3009
          NEXT_PUBLIC_API_URL: http://localhost:8009
          NEXT_TELEMETRY_DISABLED: "1"

      - name: API — ruff + import smoke
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff
          ruff check app
          python -c "from app.main import app; print('api import OK')"

  deploy:
    name: Deploy to Hetzner VPS
    needs: build-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check deploy secrets
        id: gate
        run: |
          if [ -n "${{ secrets.SSH_HOST }}" ] && [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy secrets not configured yet — skipping SSH deploy. Set SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, and (optionally) VPS_APP_DIR / SSH_PORT in repo settings to activate."
          fi

      - name: Deploy over SSH
        if: steps.gate.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/eastern-rentals' }}"
            cd "$APP_DIR"
            git fetch --all --prune
            git reset --hard origin/main
            # App secrets live in a Doppler-synced .env on the host (owner standard).
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f
            docker compose ps

      - name: Smoke test (web responds)
        if: steps.gate.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            curl -fsS --retry 5 --retry-delay 3 http://localhost:3009/ >/dev/null \
              && echo "web smoke OK (:3009)"
