name: Deploy

# CI/CD: lint → build gate → deploy over SSH to the Hetzner VPS (build-on-box compose,
# behind the shared hampton_nginx proxy). Code is fetched on the box via the workflow's
# own GITHUB_TOKEN (the box's origin key isn't scoped to this repo). App secrets come from
# a Doppler-synced .env on the host.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-eastern-equip-rentals
  cancel-in-progress: false

jobs:
  build-test:
    name: Build & test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Web — install, lint, build
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3009
          NEXT_PUBLIC_API_URL: http://localhost:8009
          NEXT_TELEMETRY_DISABLED: "1"
      - name: API — ruff + import smoke
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff
          ruff check app
          python -c "from app.main import app; print('api import OK')"

  deploy:
    name: Deploy to Hetzner VPS
    needs: build-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          envs: GH_TOKEN
          script: |
            set -euo pipefail
            cd /opt/eastern-rentals
            git fetch "https://x-access-token:${GH_TOKEN}@github.com/afintech510/eastern-equip-rentals.git" main
            git reset --hard FETCH_HEAD
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f
            docker compose ps
            curl -fsS --max-time 10 --retry 4 --retry-delay 3 --retry-connrefused http://localhost:3009/ >/dev/null \
              && echo "health OK (:3009)" \
              || echo "WARN: health check did not pass (deploy applied)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
