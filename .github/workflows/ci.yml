name: CI

# Lint + type-check + build on every push and PR. Fast gate; no deploy.
on:
  push:
    branches-ignore: []
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (Next.js) — lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          # Placeholder public vars so the build is deterministic in CI.
          # Real values are injected at deploy time (Doppler) on the VPS.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3009
          NEXT_PUBLIC_API_URL: http://localhost:8009
          NEXT_TELEMETRY_DISABLED: "1"

  api:
    name: API (FastAPI) — lint, import
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps + ruff + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff pytest

      - name: Ruff lint
        run: ruff check app

      - name: Import smoke (app boots)
        run: python -c "from app.main import app; print('api import OK')"

      - name: Unit tests (availability logic)
        run: python -m pytest -q

  db:
    name: DB — apply migrations + seed + acceptance (Postgres 15)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eastern_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: eastern_test
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap Supabase stubs (CI only)
        run: psql -v ON_ERROR_STOP=1 -f supabase/ci/00_bootstrap_stub.sql

      - name: Apply migrations (in order)
        run: |
          for f in supabase/migrations/*.sql; do
            echo "── applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Seed (idempotent — run twice)
        run: |
          psql -v ON_ERROR_STOP=1 -f supabase/seed.sql
          psql -v ON_ERROR_STOP=1 -f supabase/seed.sql

      - name: Acceptance assertions (exclusion / transitions / config / RLS column-scope)
        run: psql -v ON_ERROR_STOP=1 -f supabase/tests/phase01_acceptance.sql

      - name: Concurrency proof (F-004 — parallel inserts, one wins)
        run: bash supabase/tests/concurrency_test.sh
