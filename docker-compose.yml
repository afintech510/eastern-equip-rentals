services:
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3009}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8009}
    container_name: eastern_web
    restart: unless-stopped
    # Owner port convention: 3009 (3003 maningo / 3005 benchworks / 3007 os-adam taken)
    ports:
      - "3009:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - eastern_net
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: ./api
    container_name: eastern_api
    restart: unless-stopped
    ports:
      - "8009:8000"
    env_file:
      - .env
    environment:
      - WEB_ORIGIN=${NEXT_PUBLIC_BASE_URL:-http://localhost:3009}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - eastern_net
    deploy:
      resources:
        limits:
          memory: 512M

  # Background-job scheduler (Phase 06): hold-expiry, SignWell polling, retention
  # purge. Reuses the api image; runs the blocking scheduler instead of uvicorn.
  worker:
    build:
      context: ./api
    container_name: eastern_worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - eastern_net
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: eastern_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - eastern_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  eastern_net:
    driver: bridge
